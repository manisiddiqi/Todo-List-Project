<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To - Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Yahan hum nay aik container banaya hai -->
    <div class="container">
        <!-- Yahan hum nay todo app kay liye list aur icons banaye hain -->
        <div class="todo-app">
            <h2>To-Do List <img src="images/icon.png"></h2>
            <div class="row">
                <input type="text" id="input-box" placeholder="Add Your Text">
                <button onclick="addTask()">Add</button>
            </div>
            <!-- Yahan hum nay list container banaya hai taakay yahan hamaray task list ho sakain -->
            <ul id="list-container">
                <!-- <li class="checked">Task 1</li>
                <li>Task 2</li>
                <li>Task 3</li> -->
            </ul>
        </div>
    </div>



<!-- Yeh hum nay apni javascript ki file ko link kiya hai -->
    <script src="script.js"></script>
</body>
</html>
